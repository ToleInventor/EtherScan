<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ethereum Mainnet Wallet Balances</title>
    <script type="module" src="https://cdn.jsdelivr.net/npm/ionicons@7.4.0/dist/ionicons/ionicons.esm.js"></script>
    <script nomodule src="https://cdn.jsdelivr.net/npm/ionicons@7.4.0/dist/ionicons/ionicons.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }

        .container {
            max-width: 900px;
            margin: 0 auto;
            background: white;
            border-radius: 20px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
            overflow: hidden;
        }

        .header {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 30px;
            text-align: center;
        }

        .header h1 {
            font-size: 1.8rem;
            margin-bottom: 8px;
        }

        .header p {
            opacity: 0.9;
            font-size: 0.9rem;
        }

        .network-badge {
            display: inline-block;
            background: rgba(255,255,255,0.2);
            padding: 5px 12px;
            border-radius: 20px;
            font-size: 0.75rem;
            margin-top: 12px;
        }

        .status-bar {
            background: #f8f9fa;
            padding: 15px 20px;
            border-bottom: 1px solid #e9ecef;
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 15px;
        }

        .progress-info {
            display: flex;
            align-items: center;
            gap: 12px;
            flex: 1;
        }

        .progress-bar {
            flex: 1;
            height: 6px;
            background: #e9ecef;
            border-radius: 3px;
            overflow: hidden;
        }

        .progress-fill {
            height: 100%;
            background: linear-gradient(90deg, #667eea, #764ba2);
            width: 0%;
            transition: width 0.3s ease;
        }

        .price-info {
            background: #e9ecef;
            padding: 6px 15px;
            border-radius: 20px;
            font-size: 0.85rem;
            font-weight: 600;
            color: #495057;
        }

        .wallets-list {
            max-height: 500px;
            overflow-y: auto;
            padding: 20px;
        }

        .wallet-item {
            background: #f8f9fa;
            border-radius: 12px;
            padding: 15px;
            margin-bottom: 10px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 15px;
            transition: transform 0.2s, box-shadow 0.2s;
        }

        .wallet-item:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(0,0,0,0.1);
        }

        .wallet-left {
            display: flex;
            align-items: center;
            gap: 15px;
            flex: 2;
            min-width: 200px;
        }

        .wallet-number {
            background: #667eea;
            color: white;
            width: 32px;
            height: 32px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: bold;
            font-size: 0.9rem;
        }

        .address-wrapper {
            display: flex;
            align-items: center;
            gap: 8px;
            background: white;
            padding: 5px 12px;
            border-radius: 8px;
            border: 1px solid #dee2e6;
        }

        .address {
            font-family: 'Courier New', monospace;
            font-size: 0.8rem;
            color: #495057;
        }

        .copy-btn {
            background: none;
            border: none;
            cursor: pointer;
            color: #6c757d;
            display: flex;
            align-items: center;
            padding: 4px;
            border-radius: 4px;
            transition: all 0.2s;
        }

        .copy-btn:hover {
            background: #e9ecef;
            color: #667eea;
        }

        .balance-right {
            text-align: right;
            min-width: 150px;
        }

        .eth-balance {
            font-size: 1.1rem;
            font-weight: bold;
            color: #28a745;
        }

        .usd-balance {
            font-size: 0.8rem;
            color: #6c757d;
            margin-top: 4px;
        }

        .total-section {
            background: linear-gradient(135deg, #28a745, #20c997);
            color: white;
            padding: 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 15px;
        }

        .total-label {
            font-size: 1rem;
            font-weight: 600;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .total-amount {
            font-size: 1.4rem;
            font-weight: bold;
        }

        .refresh-btn {
            background: rgba(255,255,255,0.2);
            border: none;
            color: white;
            padding: 10px 20px;
            border-radius: 25px;
            cursor: pointer;
            font-size: 0.9rem;
            font-weight: 600;
            display: flex;
            align-items: center;
            gap: 8px;
            transition: all 0.2s;
        }

        .refresh-btn:hover:not(:disabled) {
            background: rgba(255,255,255,0.3);
            transform: scale(1.02);
        }

        .refresh-btn:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }

        @keyframes spin {
            from { transform: rotate(0deg); }
            to { transform: rotate(360deg); }
        }

        .spinning {
            animation: spin 1s linear infinite;
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: translateY(10px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        ::-webkit-scrollbar {
            width: 8px;
        }

        ::-webkit-scrollbar-track {
            background: #f1f1f1;
        }

        ::-webkit-scrollbar-thumb {
            background: #888;
            border-radius: 4px;
        }

        .error-item {
            background: #f8d7da;
            color: #721c24;
            padding: 10px;
            border-radius: 8px;
            text-align: center;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>
                <ion-icon name="wallet-outline"></ion-icon>
                Wallet Balances
            </h1>
            <p>Ethereum Mainnet - 15 Wallet Addresses</p>
            <div class="network-badge">
                <ion-icon name="checkmark-circle"></ion-icon> Mainnet
            </div>
        </div>

        <div class="status-bar">
            <div class="progress-info">
                <ion-icon name="sync-outline" id="statusIcon"></ion-icon>
                <span id="statusText">Ready to load</span>
                <div class="progress-bar">
                    <div class="progress-fill" id="progressFill"></div>
                </div>
            </div>
            <div class="price-info" id="priceInfo">
                <ion-icon name="cash-outline"></ion-icon>
                <span id="ethPrice">ETH: Loading...</span>
            </div>
        </div>

        <div id="walletsContainer" class="wallets-list">
            <div style="text-align: center; padding: 40px; color: #6c757d;">
                <ion-icon name="cloud-download-outline" style="font-size: 2rem;"></ion-icon>
                <p>Click refresh to load wallet balances</p>
            </div>
        </div>

        <div class="total-section" id="totalSection" style="display: none;">
            <div class="total-label">
                <ion-icon name="trending-up-outline"></ion-icon>
                Total Value (All Wallets)
            </div>
            <div>
                <span class="total-amount" id="totalETH">0 ETH</span>
                <span style="margin: 0 10px">|</span>
                <span class="total-amount" id="totalUSD">$0.00</span>
            </div>
            <button id="refreshBtn" class="refresh-btn" onclick="loadBalances()">
                <ion-icon name="refresh-outline"></ion-icon>
                Refresh
            </button>
        </div>
    </div>

    <script>
        // 15 Wallet addresses (Mainnet)
        const WALLET_ADDRESSES = [
            '0x132695b798f6633a230adc07eaa7809f512e42df',
            '0x59209468bf21b81e1ad1b8f6bb0911bafc650bf1',
            '0x91af34de8602dcb5d5e6f9474a18484539dc80fa',
            '0x5d6b91ab209e2acafb4b86e13e964ee17702730f',
            '0x343965d15d907a3700a2e119e91f0f277ff657a1',
            '0x2623bfa80b75f7c107bfa068067f090c48996978',
            '0x443dbd36604b472a72058c0e52619585604fdeb4',
            '0xc04ce509da0c3ca27cce8003a8125ee000979522',
            '0xe584e7f484d8560af10fad63b24af6cb036fa6ee',
            '0xbf95ae58d608b8b33a3ad093b5c56886b1a0ec85',
            '0xbcaf93b63a77867c8e0ef26d8bde55cd7fbac410',
            '0xcb09907b25d4667ca0b58153645d163b24434fa5',
            '0x5075774074de00601aaa29aa7c0a2695185f7107',
            '0x2afabcd428f11c1393e1bfbbb572ebffcd5a74ad',
            '0x6b8fc091c5f4cb485318d7536127f9ad069bbaec'
            '0x2Ef1189f58753496058D604Fa52886dCe4c57fb8'
        ];

        // More reliable CORS-friendly public RPC endpoints
        const RPC_ENDPOINTS = [
            'https://eth.llamarpc.com',
            'https://rpc.mevblocker.io',
            'https://eth-mainnet.gateway.tenderly.co',
            'https://ethereum.blockpi.network/v1/rpc/public',
            'https://1rpc.io/eth'
        ];

        let currentETHPrice = 0;

        // Get ETH price from CoinGecko (CORS-friendly)
        async function getETHPrice() {
            try {
                const response = await fetch('https://api.coingecko.com/api/v3/simple/price?ids=ethereum&vs_currencies=usd');
                const data = await response.json();
                currentETHPrice = data.ethereum.usd;
                document.getElementById('ethPrice').innerHTML = `ETH: $${currentETHPrice.toFixed(2)}`;
                return currentETHPrice;
            } catch (error) {
                console.warn('Price fetch failed, using fallback:', error);
                currentETHPrice = 3200;
                document.getElementById('ethPrice').innerHTML = `ETH: ~$${currentETHPrice}`;
                return currentETHPrice;
            }
        }

        // Get balance from mainnet with retry and multiple endpoints
        async function getBalance(address) {
            for (let i = 0; i < RPC_ENDPOINTS.length; i++) {
                const endpoint = RPC_ENDPOINTS[i];
                try {
                    const response = await fetch(endpoint, {
                        method: 'POST',
                        headers: {
                            'Content-Type': 'application/json',
                        },
                        body: JSON.stringify({
                            jsonrpc: '2.0',
                            method: 'eth_getBalance',
                            params: [address.toLowerCase(), 'latest'],
                            id: 1
                        }),
                        signal: AbortSignal.timeout(10000) // 10 second timeout
                    });
                    
                    if (!response.ok) throw new Error(`HTTP ${response.status}`);
                    
                    const data = await response.json();
                    if (data && data.result && data.result !== '0x0') {
                        const balanceWei = parseInt(data.result, 16);
                        return balanceWei / 1e18;
                    } else if (data && data.result === '0x0') {
                        return 0;
                    }
                    throw new Error('Invalid response');
                } catch (error) {
                    console.warn(`RPC ${endpoint} failed for ${address.slice(0,8)}...:`, error.message);
                    if (i === RPC_ENDPOINTS.length - 1) {
                        console.error(`All RPCs failed for ${address}`);
                        return 0;
                    }
                    // Wait before trying next endpoint
                    await new Promise(resolve => setTimeout(resolve, 500));
                }
            }
            return 0;
        }

        // Format address for display
        function formatAddress(address) {
            return `${address.slice(0, 6)}...${address.slice(-4)}`;
        }

        // Copy address to clipboard
        window.copyAddress = async function(address, btn) {
            try {
                await navigator.clipboard.writeText(address);
                const icon = btn.querySelector('ion-icon');
                const originalName = icon.getAttribute('name');
                icon.setAttribute('name', 'checkmark-circle');
                btn.style.color = '#28a745';
                setTimeout(() => {
                    icon.setAttribute('name', originalName);
                    btn.style.color = '';
                }, 1500);
            } catch (err) {
                console.error('Copy failed:', err);
            }
        };

        // Update progress
        function updateProgress(current, total, message) {
            const percent = (current / total) * 100;
            document.getElementById('progressFill').style.width = `${percent}%`;
            document.getElementById('statusText').innerHTML = message || `Loading ${current}/${total} wallets`;
            
            const icon = document.getElementById('statusIcon');
            if (current < total) {
                icon.setAttribute('name', 'sync-outline');
                icon.classList.add('spinning');
            } else {
                icon.classList.remove('spinning');
                icon.setAttribute('name', 'checkmark-circle');
            }
        }

        // Main function to load all balances
        window.loadBalances = async function() {
            const walletsContainer = document.getElementById('walletsContainer');
            const totalSection = document.getElementById('totalSection');
            const refreshBtn = document.getElementById('refreshBtn');
            
            // Disable button and show loading
            refreshBtn.disabled = true;
            refreshBtn.innerHTML = '<ion-icon name="hourglass-outline"></ion-icon> Loading...';
            
            // Clear previous results
            walletsContainer.innerHTML = '';
            totalSection.style.display = 'none';
            
            // Get current ETH price
            updateProgress(0, WALLET_ADDRESSES.length, 'Fetching ETH price...');
            await getETHPrice();
            
            let totalETH = 0;
            let totalUSD = 0;
            let loadedCount = 0;
            
            // Load each wallet balance
            for (let i = 0; i < WALLET_ADDRESSES.length; i++) {
                const address = WALLET_ADDRESSES[i];
                updateProgress(i + 1, WALLET_ADDRESSES.length, `Loading wallet ${i + 1}/${WALLET_ADDRESSES.length}`);
                
                const eth = await getBalance(address);
                const usd = eth * currentETHPrice;
                
                totalETH += eth;
                totalUSD += usd;
                loadedCount++;
                
                // Create wallet item with animation
                const walletItem = document.createElement('div');
                walletItem.className = 'wallet-item';
                walletItem.style.animation = 'fadeIn 0.3s ease';
                walletItem.innerHTML = `
                    <div class="wallet-left">
                        <div class="wallet-number">${i + 1}</div>
                        <div class="address-wrapper">
                            <div class="address" title="${address}">${formatAddress(address)}</div>
                            <button class="copy-btn" onclick="copyAddress('${address}', this)" title="Copy full address">
                                <ion-icon name="copy-outline"></ion-icon>
                            </button>
                        </div>
                    </div>
                    <div class="balance-right">
                        <div class="eth-balance">${eth.toFixed(6)} ETH</div>
                        <div class="usd-balance">$${usd.toLocaleString('en-US', {minimumFractionDigits: 2, maximumFractionDigits: 2})}</div>
                    </div>
                `;
                
                walletsContainer.appendChild(walletItem);
                
                // Small delay to avoid rate limiting
                await new Promise(resolve => setTimeout(resolve, 200));
            }
            
            // Show total section
            totalSection.style.display = 'flex';
            document.getElementById('totalETH').innerHTML = `${totalETH.toFixed(6)} ETH`;
            document.getElementById('totalUSD').innerHTML = `$${totalUSD.toLocaleString('en-US', {minimumFractionDigits: 2, maximumFractionDigits: 2})}`;
            
            // Update final status
            updateProgress(WALLET_ADDRESSES.length, WALLET_ADDRESSES.length, `✓ Successfully loaded ${loadedCount} wallets!`);
            
            // Re-enable refresh button
            refreshBtn.disabled = false;
            refreshBtn.innerHTML = '<ion-icon name="refresh-outline"></ion-icon> Refresh';
        };
        
        // Auto-load on page load
        window.addEventListener('DOMContentLoaded', () => {
            loadBalances();
        });
    </script>
</body>
</html>
