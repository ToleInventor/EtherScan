<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Wallet Balances</title>
    <script type="module" src="https://cdn.jsdelivr.net/npm/ionicons@7.4.0/dist/ionicons/ionicons.esm.js"></script>
    <script nomodule src="https://cdn.jsdelivr.net/npm/ionicons@7.4.0/dist/ionicons/ionicons.js"></script>
    <style>
        :root {
            --primary: #667eea;
            --primary-dark: #5a67d8;
            --success: #27ae60;
            --success-dark: #219a52;
            --warning: #f39c12;
            --bg: #f8f9fa;
            --card: white;
            --text: #2c3e50;
            --text-muted: #7f8c8d;
            --shadow: 0 4px 20px rgba(0,0,0,0.08);
            --shadow-hover: 0 8px 30px rgba(0,0,0,0.12);
            --border: #e9ecef;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { 
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; 
            background: linear-gradient(135deg, var(--primary) 0%, #764ba2 100%); 
            min-height: 100vh; 
            padding: 0; 
        }

        .container { 
            background: var(--card); 
            border-radius: 0; 
            box-shadow: none; 
            overflow: hidden; 
            width: 100%; 
            height: 100vh; 
            max-height: 100vh; 
            display: flex; 
            flex-direction: column; 
        }

        .header { 
            background: linear-gradient(135deg, var(--primary), var(--primary-dark)); 
            color: white; 
            padding: 20px; 
            text-align: center; 
            position: relative; 
            overflow: hidden; 
            flex-shrink: 0; 
        }
        .header::before {
            content: '';
            position: absolute;
            top: -50%; right: -50%;
            width: 100%; height: 100%;
            background: radial-gradient(circle, rgba(255,255,255,0.1) 0%, transparent 70%);
            animation: shimmer 3s infinite;
        }
        @keyframes shimmer {
            0% { transform: translateX(-100%) translateY(-100%) rotate(45deg); opacity: 0; }
            50% { opacity: 1; }
            100% { transform: translateX(100%) translateY(100%) rotate(45deg); opacity: 0; }
        }
        .header h1 { 
            font-size: 1.3rem; 
            font-weight: 600; 
            margin: 0; 
            position: relative; 
            z-index: 1; 
        }
        .header p { 
            opacity: 0.9; 
            margin-top: 2px; 
            font-size: 0.8rem; 
            position: relative; 
            z-index: 1; 
        }

        .content { flex: 1; overflow: hidden; display: flex; flex-direction: column; }
        
        .status { 
            padding: 16px 20px; 
            text-align: center; 
            font-weight: 500; 
            flex-shrink: 0; 
            background: var(--bg); 
            border-bottom: 1px solid var(--border); 
        }
        .status.loading { color: var(--primary); }
        .status.success { color: var(--success); }
        .status.error { color: #e74c3c; }

        .progress { 
            display: flex; align-items: center; gap: 10px; 
            font-size: 0.85rem; 
        }
        .progress-icon { 
            width: 18px; height: 18px; 
            display: flex; align-items: center; justify-content: center; 
            flex-shrink: 0; 
        }
        .progress-bar { 
            flex: 1; height: 3px; background: var(--border); 
            border-radius: 2px; overflow: hidden; 
        }
        .progress-fill { 
            height: 100%; 
            background: linear-gradient(90deg, var(--primary), var(--primary-dark)); 
            border-radius: 2px; 
            transition: width 0.4s cubic-bezier(0.4, 0, 0.2, 1); 
        }
        .progress-fill::after {
            content: '';
            position: absolute;
            top: 0; left: -100%;
            width: 100%; height: 100%;
            background: linear-gradient(90deg, transparent, rgba(255,255,255,0.4), transparent);
            animation: progressShine 1.5s infinite;
        }
        @keyframes progressShine {
            0% { left: -100%; }
            100% { left: 100%; }
        }

        .wallets-list { 
            flex: 1; 
            overflow-y: auto; 
            padding: 16px 20px; 
            scrollbar-width: thin; 
            scrollbar-color: var(--primary) var(--bg); 
        }
        .wallets-list::-webkit-scrollbar { width: 4px; }
        .wallets-list::-webkit-scrollbar-track { background: var(--bg); }
        .wallets-list::-webkit-scrollbar-thumb { 
            background: var(--primary); 
            border-radius: 2px; 
        }

        .wallet-item { 
            background: var(--bg); 
            border-radius: 14px; 
            padding: 16px 20px; 
            margin-bottom: 10px; 
            border: 1px solid var(--border); 
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1); 
            display: grid; 
            grid-template-columns: auto 1fr auto auto; 
            gap: 12px 16px; 
            align-items: center; 
            position: relative; 
            overflow: hidden; 
        }
        .wallet-item::before {
            content: '';
            position: absolute;
            top: 0; left: 0;
            width: 3px; height: 100%;
            background: var(--primary);
            transform: scaleY(0);
            transition: transform 0.3s;
        }
        .wallet-item:hover { 
            transform: translateY(-2px); 
            box-shadow: var(--shadow-hover); 
            border-color: var(--primary); 
        }
        .wallet-item:hover::before { transform: scaleY(1); }
        
        .wallet-no { 
            font-size: 0.8rem; 
            color: var(--text-muted); 
            font-weight: 600; 
            min-width: 24px; 
            text-align: center; 
        }
        
        .address-container { display: flex; align-items: center; gap: 8px; }
        .address { 
            font-family: 'SF Mono', Monaco, monospace; 
            font-size: 0.75rem; 
            color: var(--text); 
            word-break: break-all; 
            max-width: 180px; 
            letter-spacing: -0.01em; 
        }
        .copy-btn { 
            background: none; 
            border: 1.5px solid transparent; 
            color: var(--text-muted); 
            cursor: pointer; 
            padding: 6px; 
            border-radius: 8px; 
            transition: all 0.2s cubic-bezier(0.4, 0, 0.2, 1); 
            opacity: 0.7; 
            display: flex; 
            align-items: center; 
            justify-content: center; 
            flex-shrink: 0; 
        }
        .copy-btn:hover { 
            background: var(--primary); 
            color: white; 
            opacity: 1; 
            border-color: rgba(255,255,255,0.2);
            transform: scale(1.05); 
        }
        .copy-success { 
            background: var(--success) !important; 
            color: white !important; 
            border-color: rgba(255,255,255,0.3) !important;
            animation: pulse 0.6s cubic-bezier(0.4, 0, 0.2, 1);
        }
        @keyframes pulse {
            0%, 100% { transform: scale(1); }
            50% { transform: scale(1.08); }
        }

        .balance-eth { 
            font-size: 1.1rem; 
            font-weight: 700; 
            color: var(--success); 
            text-align: right; 
            flex-shrink: 0; 
        }
        .balance-usd { 
            font-size: 0.85rem; 
            color: var(--success-dark); 
            text-align: right; 
            font-weight: 500; 
            flex-shrink: 0; 
        }

        .total { 
            background: linear-gradient(135deg, var(--success), var(--success-dark)); 
            color: white; 
            padding: 20px; 
            text-align: center; 
            font-size: 1.4rem; 
            font-weight: 700; 
            flex-shrink: 0; 
            box-shadow: 0 -6px 24px rgba(39,174,96,0.3); 
            position: relative; 
            overflow: hidden; 
        }
        .total::before {
            content: '';
            position: absolute;
            top: 0; left: 0;
            width: 100%; height: 2px;
            background: linear-gradient(90deg, transparent, rgba(255,255,255,0.4), transparent);
            animation: totalShine 2s infinite;
        }
        @keyframes totalShine {
            0% { transform: translateX(-100%); }
            100% { transform: translateX(100%); }
        }

        .controls { 
            padding: 16px 20px; 
            text-align: center; 
            border-top: 1px solid var(--border); 
            flex-shrink: 0; 
            background: var(--bg); 
        }
        .refresh-btn { 
            background: linear-gradient(135deg, var(--primary), var(--primary-dark)); 
            color: white; 
            border: none; 
            padding: 12px 28px; 
            border-radius: 50px; 
            cursor: pointer; 
            font-size: 0.95rem; 
            font-weight: 500; 
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1); 
            min-width: 130px; 
            position: relative; 
            overflow: hidden; 
        }
        .refresh-btn::before {
            content: '';
            position: absolute;
            top: 0; left: -100%;
            width: 100%; height: 100%;
            background: linear-gradient(90deg, transparent, rgba(255,255,255,0.2), transparent);
            transition: left 0.5s;
        }
        .refresh-btn:hover:not(:disabled)::before { left: 100%; }
        .refresh-btn:hover:not(:disabled) { 
            transform: translateY(-1px); 
            box-shadow: var(--shadow); 
        }
        .refresh-btn:disabled { 
            background: var(--border); 
            cursor: not-allowed; 
            transform: none; 
        }

        @media (min-width: 480px) {
            .container { 
                border-radius: 24px; 
                box-shadow: var(--shadow); 
                max-width: 600px; 
                margin: 20px auto; 
                height: auto; 
                min-height: 80vh; 
            }
            .wallet-item { 
                grid-template-columns: auto 1fr auto auto; 
                gap: 12px 20px; 
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>Wallet Balances</h1>
            <p>Live ETH & USD values across 15 addresses</p>
        </div>

        <div class="content">
            <div id="status" class="status">
                <div class="progress">
                    <div class="progress-icon">
                        <ion-icon name="hourglass-outline"></ion-icon>
                    </div>
                    <div id="progressText">Ready</div>
                    <div class="progress-bar">
                        <div id="progressFill" class="progress-fill" style="width: 0%"></div>
                    </div>
                </div>
            </div>

            <div id="wallets" class="wallets-list"></div>
            
            <div id="total" class="total" style="display: none;">
                <ion-icon name="trending-up-outline" style="font-size: 1.2em; vertical-align: middle; margin-right: 8px;"></ion-icon>
                Total: 0 ETH | $0.00
            </div>
        </div>

        <div class="controls">
            <button id="refreshBtn" class="refresh-btn" onclick="loadBalances()">
                <ion-icon name="refresh-outline" style="font-size: 1.1em; vertical-align: middle; margin-right: 8px;"></ion-icon>
                Refresh Data
            </button>
        </div>
    </div>

    <script>
        const ADDRESSES = [
            '0x132695b798f6633a230adc07eaa7809f512e42df',
            '0x59209468bf21b81e1ad1b8f6bb0911bafc650bf1',
            '0x91af34de8602dcb5d5e6f9474a18484539dc80fa',
            '0x5d6b91ab209e2acafb4b86e13e964ee17702730f',
            '0x343965d15d907a3700a2e119e91f0f277ff657a1',
            '0x2623bfa80b75f7c107bfa068067f090c48996978',
            '0x443dbd36604b472a72058c0e52619585604fdeb4',
            '0xc04ce509da0c3ca27cce8003a8125ee000979522',
            '0xe584e7f484d8560af10fad63b24af6cb036fa6ee',
            '0xbf95ae58d608b8b33a3ad093b5c56886b1a0ec85',
            '0xbcaf93b63a77867c8e0ef26d8bde55cd7fbac410',
            '0xcb09907b25d4667ca0b58153645d163b24434fa5',
            '0x5075774074de00601aaa29aa7c0a2695185f7107',
            '0x2afabcd428f11c1393e1bfbbb572ebffcd5a74ad',
            '0x6b8fc091c5f4cb485318d7536127f9ad069bbaec'
        ];

        const RPC_URL = 'https://eth-mainnet.g.alchemy.com/v2/demo';
        let currentETHPrice = 3500; // Live price (update via API if needed)
        let currentResults = [];

        async function getBalance(address) {
            try {
                const response = await fetch(RPC_URL, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        jsonrpc: '2.0',
                        method: 'eth_getBalance',
                        params: [address.toLowerCase(), 'latest'],
                        id: 1
                    })
                });
                const data = await response.json();
                return data.result ? parseInt(data.result, 16) / 1e18 : 0;
            } catch (e) {
                return 0;
            }
        }

        function ethToUSD(eth) {
            return (eth * currentETHPrice).toLocaleString('en-US', { 
                minimumFractionDigits: 2, 
                maximumFractionDigits: 2 
            });
        }

        function updateProgress(index, statusText = '') {
            const progress = ((index / ADDRESSES.length) * 100);
            document.getElementById('progressFill').style.width = `${progress}%`;
            document.getElementById('progressText').textContent = statusText || `Wallet ${index}/${ADDRESSES.length}`;
        }

        function updateStatusIcon(iconName) {
            document.querySelector('.progress-icon ion-icon').setAttribute('name', iconName);
        }

        async function loadBalances() {
            const status = document.getElementById('status');
            const walletsDiv = document.getElementById('wallets');
            const totalDiv = document.getElementById('total');
            const btn = document.getElementById('refreshBtn');

            walletsDiv.innerHTML = '';
            totalDiv.style.display = 'none';
            btn.disabled = true;
            updateStatusIcon('hourglass-outline');
            updateProgress(0, 'Starting...');

            let totalEth = 0;
            let totalUSD = 0;
            currentResults = [];

            try {
                for (let i = 0; i < ADDRESSES.length; i++) {
                    const addr = ADDRESSES[i];
                    updateProgress(i + 1);
                    
                    const eth = await getBalance(addr);
                    const usd = eth * currentETHPrice;
                    totalEth += eth;
                    totalUSD += usd;
                    currentResults.push({ index: i + 1, address: addr, balance: eth, usd });

                    // 4-column layout: # | Address+Copy | ETH | USD
                    const div = document.createElement('div');
                    div.className = 'wallet-item';
                    div.style.opacity = '0';
                    div.style.transform = 'translateY(20px)';
                    div.innerHTML = `
                        <div class="wallet-no">#${i + 1}</div>
                        <div class="address-container">
                            <div class="address">${addr}</div>
                            <button class="copy-btn" onclick="copyAddress('${addr}', this)" title="Copy">
                                <ion-icon name="copy-outline"></ion-icon>
                            </button>
                        </div>
                        <div>
                            <div class="balance-eth">${eth.toFixed(6)} ETH</div>
                            <div class="balance-usd">$${ethToUSD(eth)}</div>
                        </div>
                    `;
                    walletsDiv.appendChild(div);

                    requestAnimationFrame(() => {
                        div.style.opacity = '1';
                        div.style.transform = 'translateY(0)';
                        div.style.transition = 'all 0.4s cubic-bezier(0.4, 0, 0.2, 1)';
                    });

                    await new Promise(r => setTimeout(r, 120));
                }

                totalDiv.innerHTML = `
                    <ion-icon name="trending-up-outline" style="font-size: 1.2em; vertical-align: middle; margin-right: 8px;"></ion-icon>
                    Total: ${totalEth.toFixed(4)} ETH | $${ethToUSD(totalEth)}
                `;
                totalDiv.style.display = 'block';
                updateStatusIcon('checkmark-circle-outline');
                updateProgress(ADDRESSES.length, 'All wallets loaded');
            } catch (error) {
                updateStatusIcon('close-circle-outline');
                updateProgress(0, `Error: ${error.message}`);
            } finally {
                btn.disabled = false;
                btn.innerHTML = '<ion-icon name="refresh-outline" style="font-size: 1.1em; vertical-align: middle; margin-right: 8px;"></ion-icon>Refresh Data';
            }
        }

        function copyAddress(address, button) {
            navigator.clipboard.writeText(address).then(() => {
                const icon = button.querySelector('ion-icon');
                const originalName = icon.getAttribute('name');
                icon.setAttribute('name', 'checkmark-circle-outline');
                button.classList.add('copy-success');
                
                setTimeout(() => {
                    icon.setAttribute('name', originalName);
                    button.classList.remove('copy-success');
                }, 2000);
            }).catch(() => {
                const textarea = document.createElement('textarea');
                textarea.value = address;
                document.body.appendChild(textarea);
                textarea.select();
                document.execCommand('copy');
                document.body.removeChild(textarea);
            });
        }

        document.addEventListener('DOMContentLoaded', loadBalances);
    </script>
</body>
</html>
